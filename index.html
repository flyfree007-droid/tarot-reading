<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 命运之轮 · 塔罗占卜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

  :root {
    --bg-deep: #080614;
    --bg-card: #110d24;
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --gold-dark: #8b6914;
    --purple: #6b3fa0;
    --purple-deep: #2a1040;
    --text: #d4c5e8;
    --text-dim: #8a7fa0;
    --accent: #c4488a;
    --reversed-bg: #3a1025;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .fog { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 50% 40%, transparent 40%, rgba(8,6,20,0.85) 100%); pointer-events: none; z-index: 1; }

  .main { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem 1rem 4rem; }

  .header { text-align: center; margin-bottom: 0.8rem; }
  .header .moon-phase { font-size: 3.5rem; filter: drop-shadow(0 0 20px rgba(201,169,110,0.4)); animation: float 4s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  .header h1 { font-family: 'Cinzel Decorative', serif; font-size: clamp(1.6rem, 4vw, 2.8rem); font-weight: 900; background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-dark) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 0.08em; margin-top: -0.3rem; }
  .header .subtitle { font-size: 1.05rem; color: var(--text-dim); font-style: italic; letter-spacing: 0.15em; margin-top: 0.3rem; }

  .divider { width: min(280px, 60vw); height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0.8rem 0 1.2rem; position: relative; }
  .divider::after { content: '✦'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-deep); padding: 0 0.8rem; color: var(--gold); font-size: 0.9rem; }

  /* ── Mode Selector ── */
  .mode-selector { display: flex; gap: 0; margin-bottom: 1.5rem; border: 1px solid rgba(201,169,110,0.3); border-radius: 6px; overflow: hidden; }
  .mode-btn { font-family: 'Cinzel Decorative', serif; font-size: 0.72rem; letter-spacing: 0.1em; padding: 0.6rem 1.4rem; background: transparent; color: var(--text-dim); border: none; cursor: pointer; transition: all 0.3s; }
  .mode-btn.active { background: rgba(201,169,110,0.15); color: var(--gold-light); box-shadow: inset 0 0 15px rgba(201,169,110,0.1); }
  .mode-btn:hover:not(.active) { color: var(--gold); background: rgba(201,169,110,0.05); }
  .mode-btn + .mode-btn { border-left: 1px solid rgba(201,169,110,0.2); }

  .instruction { text-align: center; color: var(--text-dim); font-size: 1.1rem; letter-spacing: 0.05em; margin-bottom: 2rem; transition: opacity 0.5s; min-height: 3rem; }

  .spread { display: flex; gap: clamp(1rem, 3vw, 2.5rem); flex-wrap: wrap; justify-content: center; perspective: 2000px; margin-bottom: 2rem; }

  .card-slot { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; }
  .card-label { font-family: 'Cinzel Decorative', serif; font-size: 0.75rem; letter-spacing: 0.15em; color: var(--gold); opacity: 0; transform: translateY(10px); transition: all 0.6s ease; }
  .card-slot.revealed .card-label { opacity: 1; transform: translateY(0); }

  /* ── The Card ── */
  .card { width: clamp(120px, 24vw, 175px); height: clamp(190px, 40vw, 290px); position: relative; cursor: pointer; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 10px; }
  .card.flipped { transform: rotateY(180deg); cursor: default; }
  .card.flipped:hover { transform: rotateY(180deg) scale(1.02); }
  .card:hover:not(.flipped) { transform: translateY(-8px) scale(1.03); filter: brightness(1.15); }
  .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 10px; overflow: hidden; }

  /* ── Card Front (Image) ── */
  .card-front { transform: rotateY(180deg); border: 1.5px solid var(--gold); box-shadow: 0 0 25px rgba(107,63,160,0.3), inset 0 0 40px rgba(107,63,160,0.08); }

  .card-front .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
  }

  .card-front .card-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 2rem 0.5rem 0.5rem;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.55) 50%, transparent 100%);
    text-align: center;
    transition: opacity 0.5s;
  }

  .card-front .card-img-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 2rem 0.6rem 0.6rem;
    background: linear-gradient(to top, rgba(8,6,20,0.95) 0%, rgba(8,6,20,0.6) 50%, transparent 100%);
    text-align: center;
    transition: all 0.5s;
  }

  .card-front .card-name { font-family: 'Cinzel Decorative', serif; font-size: clamp(0.7rem, 1.8vw, 0.95rem); font-weight: 700; color: var(--gold-light); letter-spacing: 0.06em; line-height: 1.3; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
  .card-front .card-roman { font-size: 0.58rem; color: rgba(232,213,163,0.8); font-style: italic; letter-spacing: 0.08em; text-shadow: 0 0 8px rgba(0,0,0,0.8); }
  .card-front .card-meaning { font-size: clamp(0.55rem, 1.3vw, 0.7rem); color: #e0d5f0; line-height: 1.5; margin-top: 0.15rem; padding: 0 0.2rem; opacity: 0; transform: translateY(8px); transition: all 0.5s ease 0.4s; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
  .card.flipped .card-meaning { opacity: 1; transform: translateY(0); }
  .card-front .card-keywords { font-size: 0.55rem; margin-top: 0.15rem; padding: 0.2rem 0.3rem 0; letter-spacing: 0.04em; opacity: 0; transition: opacity 0.5s ease 0.6s; color: var(--gold); text-shadow: 0 0 4px rgba(0,0,0,0.8); }
  .card.flipped .card-keywords { opacity: 1; }

  /* ── Reversed card styling ── */
  .card.reversed .card-front .card-img { transform: rotate(180deg); }
  .card.reversed .card-front { border-color: var(--accent); box-shadow: 0 0 30px rgba(196,72,138,0.3), inset 0 0 40px rgba(196,72,138,0.1); }
  .card.reversed .card-front .card-name { color: var(--accent); }
  .card.reversed .card-front .card-roman { color: #d4a0b8; }
  .card.reversed .card-front .card-keywords { color: var(--accent); }
  .card.reversed .card-front .card-img-overlay { background: linear-gradient(to top, rgba(42,16,37,0.95) 0%, rgba(42,16,37,0.6) 50%, transparent 100%); }

  /* ── Badge ── */
  .card-badge { position: absolute; top: 6px; right: 8px; font-family: 'Cinzel Decorative', serif; font-size: 0.55rem; padding: 3px 7px; border-radius: 3px; letter-spacing: 0.1em; z-index: 5; opacity: 0; transform: scale(0.5); transition: all 0.4s ease 0.3s; pointer-events: none; backdrop-filter: blur(4px); }
  .card.flipped .card-badge { opacity: 1; transform: scale(1); }
  .card-badge.upright { background: rgba(201,169,110,0.25); color: var(--gold-light); border: 1px solid rgba(201,169,110,0.4); }
  .card-badge.reversed-badge { background: rgba(196,72,138,0.25); color: var(--accent); border: 1px solid rgba(196,72,138,0.4); }

  /* ── Card Back (Dark Mystic) ── */
  .card-back {
    background: #0a0620;
    border: 1.5px solid rgba(201,169,110,0.4);
    box-shadow: 0 2px 20px rgba(139,105,20,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Outer geometric border */
  .card-back::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(201,169,110,0.12);
    border-radius: 6px;
    pointer-events: none;
  }
  /* Central diamond */
  .card-back::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 42px; height: 42px;
    transform: translate(-50%, -50%) rotate(45deg);
    border: 1.5px solid rgba(201,169,110,0.5);
    pointer-events: none;
    box-shadow: 0 0 30px rgba(201,169,110,0.15), 0 0 60px rgba(201,169,110,0.06);
    animation: diamondPulse 4s ease-in-out infinite;
  }
  @keyframes diamondPulse {
    0%, 100% { border-color: rgba(201,169,110,0.5); box-shadow: 0 0 30px rgba(201,169,110,0.15), 0 0 60px rgba(201,169,110,0.06); }
    50% { border-color: rgba(201,169,110,0.75); box-shadow: 0 0 40px rgba(201,169,110,0.25), 0 0 80px rgba(201,169,110,0.1); }
  }
  .card-back-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Small inner dot */
  .card-back-inner::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 6px; height: 6px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: rgba(201,169,110,0.7);
    box-shadow: 0 0 8px rgba(201,169,110,0.4);
  }

  /* ── Reading Panel ── */
  .reading { max-width: 680px; width: 100%; text-align: center; opacity: 0; transform: translateY(20px); transition: all 0.8s ease 0.3s; pointer-events: none; }
  .reading.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .reading .reading-title { font-family: 'Cinzel Decorative', serif; font-size: 1.3rem; color: var(--gold-light); letter-spacing: 0.1em; margin-bottom: 1rem; }
  .reading .reading-text { font-size: 1.05rem; line-height: 1.8; color: var(--text); font-style: italic; padding: 1.5rem 2rem; background: rgba(17,13,36,0.7); border: 1px solid rgba(201,169,110,0.2); border-radius: 12px; position: relative; }
  .reading .reading-text::before, .reading .reading-text::after { content: '"'; font-family: 'Cinzel Decorative', serif; font-size: 2.5rem; color: var(--gold); opacity: 0.3; position: absolute; line-height: 1; }
  .reading .reading-text::before { top: -0.3rem; left: 0.8rem; }
  .reading .reading-text::after { bottom: -1.5rem; right: 0.8rem; }

  /* ── Single/Three Card Summary ── */
  .reading .reading-card-summary { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .reading .mini-card { display: inline-flex; flex-direction: column; align-items: center; gap: 0.2rem; padding: 0.5rem; background: rgba(17,13,36,0.8); border: 1px solid rgba(201,169,110,0.25); border-radius: 10px; overflow: hidden; width: 90px; }
  .reading .mini-card.reversed-mini { border-color: rgba(196,72,138,0.3); background: rgba(42,16,37,0.8); }
  .reading .mini-card .mini-img { width: 100%; height: auto; border-radius: 4px; display: block; }
  .reading .mini-card .mini-img.reversed-img { transform: rotate(180deg); }
  .reading .mini-card .mini-name { font-family: 'Cinzel Decorative', serif; font-size: 0.7rem; color: var(--gold-light); margin-top: 0.2rem; }
  .reading .mini-card.reversed-mini .mini-name { color: var(--accent); }
  .reading .mini-card .mini-pos { font-size: 0.6rem; color: var(--text-dim); }
  .reading .mini-card .mini-badge { font-size: 0.5rem; letter-spacing: 0.1em; margin-top: 0.1rem; padding: 1px 6px; border-radius: 3px; }
  .reading .mini-card .mini-badge.upright-badge { color: var(--gold); border: 1px solid rgba(201,169,110,0.3); }
  .reading .mini-card .mini-badge.reversed-badge { color: var(--accent); border: 1px solid rgba(196,72,138,0.3); }

  .btn-row { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; justify-content: center; }
  .btn { font-family: 'Cinzel Decorative', serif; font-size: 0.8rem; letter-spacing: 0.12em; padding: 0.8rem 2rem; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; border-radius: 4px; transition: all 0.3s; text-transform: uppercase; }
  .btn:hover { background: rgba(201,169,110,0.1); box-shadow: 0 0 20px rgba(201,169,110,0.2); }
  .btn.primary { background: rgba(201,169,110,0.12); border-color: var(--gold-light); color: var(--gold-light); }
  .btn.primary:hover { background: rgba(201,169,110,0.25); box-shadow: 0 0 30px rgba(201,169,110,0.3); }

  .flip-progress { display: flex; gap: 0.4rem; margin-bottom: 1.5rem; }
  .flip-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(201,169,110,0.2); border: 1px solid rgba(201,169,110,0.3); transition: all 0.4s; }
  .flip-dot.done { background: var(--gold); box-shadow: 0 0 10px var(--gold); }

  /* ── Deck Pile ── */
  .deck-area { position: relative; width: 100%; min-height: 360px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; overflow: visible; z-index: 5; }
  .deck-pile { position: relative; width: 140px; height: 210px; cursor: pointer; transition: transform 0.3s; }
  .deck-pile:hover { transform: translateY(-6px); }
  .deck-pile:active { transform: scale(0.96); }
  .deck-pile .stack-card {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    border: 2px solid rgba(201,169,110,0.5);
    background: radial-gradient(ellipse at 50% 45%, #1a1040 0%, #0c0820 50%, #060312 100%);
    box-shadow: 0 4px 25px rgba(139,105,20,0.15);
    transition: all 0.4s ease;
  }
  .deck-pile .stack-card:nth-child(1) { transform: translate(-3px, -3px) rotate(-1.5deg); }
  .deck-pile .stack-card:nth-child(2) { transform: translate(0, -1.5px) rotate(0deg); }
  .deck-pile .stack-card:nth-child(3) { transform: translate(3px, 0) rotate(1.5deg); }
  .deck-pile .stack-card:nth-child(4) { transform: translate(1.5px, 2px) rotate(0.8deg); }
  .deck-pile .stack-card:nth-child(5) { transform: translate(-1.5px, 3px) rotate(-0.8deg); }
  .deck-pile .deck-eye {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3rem;
    filter: drop-shadow(0 0 20px rgba(201,169,110,0.5));
    z-index: 10;
    animation: eyePulse 3s ease-in-out infinite;
  }
  .deck-pile .deck-hint {
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: rgba(201,169,110,0.6);
    white-space: nowrap;
    animation: hintFloat 2s ease-in-out infinite;
  }
  @keyframes hintFloat {
    0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
    50% { opacity: 0.8; transform: translateX(-50%) translateY(-4px); }
  }
  .deck-pile.shuffling .stack-card {
    animation: shuffleCards 0.6s ease-out;
  }
  .deck-pile.shuffling .stack-card:nth-child(2) { animation-delay: 0.05s; }
  .deck-pile.shuffling .stack-card:nth-child(3) { animation-delay: 0.1s; }
  .deck-pile.shuffling .stack-card:nth-child(4) { animation-delay: 0.15s; }
  .deck-pile.shuffling .stack-card:nth-child(5) { animation-delay: 0.2s; }
  @keyframes shuffleCards {
    0% { transform: translate(0,0) rotate(0); }
    30% { transform: translate(var(--sx, 10px), var(--sy, -10px)) rotate(var(--sr, 10deg)); }
    60% { transform: translate(calc(var(--sx, 10px) * -0.5), calc(var(--sy, -10px) * 0.8)) rotate(calc(var(--sr, 10deg) * -0.5)); }
    100% { transform: translate(0, 0) rotate(0); }
  }

  /* ── Fan Layout ── */
  .fan-container {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.6rem;
    padding: 2rem 1rem;
  }
  .fan-card-wrap {
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
    position: relative;
  }
  .fan-card-wrap:hover { transform: translateY(-16px) scale(1.08) !important; z-index: 20 !important; }
  .fan-card-wrap:hover .fan-glow { opacity: 1; }
  .fan-card-wrap.selected { transform: translateY(-30px) scale(1.05) !important; }
  .fan-card-wrap.selected .fan-glow { opacity: 1; background: rgba(201,169,110,0.3); box-shadow: 0 0 30px rgba(201,169,110,0.5); }
  .fan-card-wrap.selected::after {
    content: '\2713';
    position: absolute;
    top: -6px;
    right: -4px;
    width: 22px;
    height: 22px;
    background: var(--gold);
    color: #080614;
    border-radius: 50%;
    font-size: 0.7rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    box-shadow: 0 0 12px rgba(201,169,110,0.6);
  }
  .fan-glow {
    position: absolute;
    inset: -6px;
    border-radius: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .fan-card-wrap .card { cursor: pointer; }

  /* ── Reveal area ── */
  .reveal-area { display: none; gap: clamp(1rem, 3vw, 2.5rem); flex-wrap: wrap; justify-content: center; margin-bottom: 2rem; }
  .reveal-area.active { display: flex; }

  /* ── Instruction updates ── */
  .instruction .counter { color: var(--gold-light); font-weight: 600; }

  @media (max-width: 640px) {
    .card { width: 105px; height: 168px; }
    .card-front .card-overlay { padding: 1.5rem 0.3rem 0.3rem; }
    .card-front .card-name { font-size: 0.58rem; }
    .card-front .card-meaning { font-size: 0.48rem; }
    .reading .reading-text { padding: 1rem 1.2rem; font-size: 0.9rem; }
    .mode-btn { padding: 0.5rem 1rem; font-size: 0.65rem; }
    .card-badge { font-size: 0.48rem; top: 4px; right: 4px; }
    .reading .mini-card { width: 65px; }
    .deck-area { min-height: 280px; }
    .deck-pile { width: 110px; height: 168px; }
    .deck-pile .deck-eye { font-size: 2.2rem; }
    .fan-container { gap: 0.3rem; padding: 1.5rem 0.3rem; }
  }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="fog"></div>

<div class="main">
  <div class="header">
    <div class="moon-phase">🔮</div>
    <h1>命运之轮</h1>
    <p class="subtitle">The Wheel of Fortune</p>
  </div>
  <div class="divider"></div>

  <!-- Mode Selector -->
  <div class="mode-selector" id="modeSelector">
    <button class="mode-btn" data-mode="single" onclick="switchMode('single')">☽ 单张占卜</button>
    <button class="mode-btn active" data-mode="three" onclick="switchMode('three')">☀ 三牌阵</button>
  </div>

  <p class="instruction" id="instruction">静心凝神，在心中默念你的问题</p>

  <div class="deck-area" id="deckArea"></div>
  <div class="reveal-area" id="revealArea"></div>

  <div class="reading" id="reading">
    <div class="reading-title">✦ 命运的低语 ✦</div>
    <div class="reading-card-summary" id="cardSummary"></div>
    <div class="reading-text" id="readingText"></div>
    <div class="btn-row">
      <button class="btn primary" onclick="reshuffle()">🔮 重新占卜</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
const MAJOR_ARCANA = [
  { id:0, name:'愚者', en:'The Fool', roman:'0', keywords:'开始·冒险·天真', keywordsR:'鲁莽·轻率·风险',
    upright:'新的旅程即将开启。保持开放的心态，勇敢迈出第一步。命运的齿轮已为你转动，相信直觉，无畏前行。',
    reversed:'冲动之举可能带来风险。暂停脚步，审视方向，莫让天真变成鲁莽。' },
  { id:1, name:'魔术师', en:'The Magician', roman:'I', keywords:'创造力·意志·掌控', keywordsR:'欺骗·滥用·失控',
    upright:'你拥有实现目标所需的一切力量。集中意志，善用资源，此刻正是将愿景化为现实的时刻。',
    reversed:'才能被浪费或滥用。警惕操纵与欺骗，确认你手中的工具是否真的为你所用。' },
  { id:2, name:'女祭司', en:'The High Priestess', roman:'II', keywords:'直觉·潜意识·神秘', keywordsR:'沉默·封闭·忽视',

//  STARFIELD
// ═══════════════════════════════════════
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [], shootingStars = [];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createStars() {
  stars = [];
  const count = Math.floor((canvas.width * canvas.height) / 1800);
  for (let i = 0; i < count; i++) {
    stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.5 + 0.3, twinkle: Math.random() * Math.PI * 2, speed: 0.01 + Math.random() * 0.03, alpha: 0.3 + Math.random() * 0.7 });
  }
}
createStars();
window.addEventListener('resize', createStars);

function spawnShootingStar() {
  if (Math.random() < 0.003) {
    shootingStars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height * 0.5, len: 40 + Math.random() * 80, speed: 8 + Math.random() * 12, angle: Math.PI/4 + Math.random()*0.3, life: 0, maxLife: 40 + Math.random() * 30 });
  }
}

function drawStarfield() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.twinkle += s.speed;
    const a = s.alpha * (0.5 + 0.5*Math.sin(s.twinkle));
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fillStyle = `rgba(220,210,255,${a})`; ctx.fill();
    if (s.r > 1.1) { ctx.beginPath(); ctx.arc(s.x, s.y, s.r*2.5, 0, Math.PI*2); ctx.fillStyle = `rgba(180,150,255,${a*0.1})`; ctx.fill(); }
  });
  spawnShootingStar();
  shootingStars = shootingStars.filter(s => {
    s.life++; if (s.life > s.maxLife) return false;
    const p = s.life/s.maxLife, a = p<0.2 ? p/0.2 : 1-(p-0.2)/0.8;
    const ex = s.x - Math.cos(s.angle)*s.len, ey = s.y + Math.sin(s.angle)*s.len;
    const g = ctx.createLinearGradient(s.x, s.y, ex, ey);
    g.addColorStop(0, `rgba(255,255,255,${a})`); g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(ex, ey); ctx.strokeStyle = g; ctx.lineWidth = 1.5; ctx.stroke();
    s.x -= Math.cos(s.angle)*s.speed; s.y += Math.sin(s.angle)*s.speed;
    return true;
  });
  requestAnimationFrame(drawStarfield);
}
drawStarfield();

function shuffle(a) { const arr = [...a]; for (let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

// ═══════════════════════════════════════
let currentMode = 'three';
let stage = 'deck'; // deck | draw | reveal
let fanCards = [];      // 7 cards spread for selection
let selectedIndices = []; // indices into fanCards
let drawnCards = [];    // final selected cards
let currentDrawCount = 0;

function getCardCount() { return currentMode === 'single' ? 1 : 3; }
function cardImagePath(id) { return 'images/' + id + '.jpg'; }

// ── Create card HTML (back-only for deck/fan, full for reveal) ──
function createCardBackHTML() {
  return `<div class="card-back-inner"></div>`;
}

function createCardFrontHTML(card) {
  const meaning = card.isReversed ? card.reversed : card.upright;
  const kw = card.isReversed ? (card.keywordsR || card.keywords) : card.keywords;
  return `
    <img class="card-img" src="${cardImagePath(card.id)}" alt="${card.name}" loading="lazy">
    <div class="card-img-overlay">
      <div class="card-name">${card.name}</div>
      <div class="card-roman">${card.roman} · ${card.en}</div>
      <div class="card-meaning">${meaning}</div>
      <div class="card-keywords">${kw}</div>
    </div>
  `;
}

function createFullCardElement(card, index) {
  const cardEl = document.createElement('div');
  cardEl.className = 'card' + (card.isReversed ? ' reversed' : '');
  cardEl.setAttribute('data-index', index);
  const badge = document.createElement('div');
  badge.className = 'card-badge ' + (card.isReversed ? 'reversed-badge' : 'upright');
  badge.textContent = card.isReversed ? '逆位' : '正位';
  const front = document.createElement('div');
  front.className = 'card-front';
  front.innerHTML = createCardFrontHTML(card);
  const back = document.createElement('div');
  back.className = 'card-back';
  back.innerHTML = createCardBackHTML();
  cardEl.appendChild(front);
  cardEl.appendChild(back);
  cardEl.appendChild(badge);
  return cardEl;
}

// ── Stage: DECK ──
function showDeck() {
  stage = 'deck';
  selectedIndices = [];
  drawnCards = [];
  currentDrawCount = 0;
  document.getElementById('reading').classList.remove('active');
  document.getElementById('reading').style.display = 'none';
  document.getElementById('revealArea').classList.remove('active');
  document.getElementById('revealArea').innerHTML = '';
  document.getElementById('instruction').style.opacity = '1';
  document.getElementById('instruction').style.display = '';
  document.getElementById('instruction').innerHTML = '静心凝神，在心中默念你的问题';

  const deckArea = document.getElementById('deckArea');
  deckArea.innerHTML = `
    <div class="deck-pile" id="deckPile" onclick="fanOut()">
      ${[1,2,3,4,5].map(() => '<div class="stack-card"></div>').join('')}
      <div class="deck-eye">🧿</div>
      <div class="deck-hint">轻触牌堆 · 抽取命运</div>
    </div>
  `;
}

// ── Stage: FAN OUT ──
function fanOut() {
  const pile = document.getElementById('deckPile');
  if (!pile) return;
  pile.classList.add('shuffling');
  
  // Prepare cards
  const count = getCardCount();
  fanCards = shuffle(MAJOR_ARCANA).slice(0, 7).map(card => ({
    ...card,
    isReversed: Math.random() < 0.5
  }));
  selectedIndices = [];
  currentDrawCount = 0;
  
  const inst = document.getElementById('instruction');
  inst.innerHTML = count === 1
    ? '命运已为你展开七张牌<br>凭直觉选择<span class="counter">1</span>张'
    : '命运已为你展开七张牌<br>凭直觉选择<span class="counter">3</span>张';
  
  setTimeout(() => {
    stage = 'draw';
    const deckArea = document.getElementById('deckArea');
    
    // Fan angles: spread 7 cards
    const totalCards = 7;
    const maxAngle = 28;
    const cardW = 140, cardH = 210;
    
    deckArea.innerHTML = '<div class="fan-container" id="fanContainer"></div>';
    const fanContainer = document.getElementById('fanContainer');
    
    fanCards.forEach((card, i) => {
      const angle = maxAngle * (i - (totalCards-1)/2) / ((totalCards-1)/2);
      const arcY = Math.abs(angle) * 1.8;
      const zIndex = totalCards - Math.abs(i - (totalCards-1)/2);
      
      const wrap = document.createElement('div');
      wrap.className = 'fan-card-wrap';
      wrap.style.transform = `rotate(${angle}deg) translateY(${arcY}px)`;
      wrap.style.zIndex = zIndex;
      wrap.style.opacity = '0';
      wrap.setAttribute('data-fan-index', i);
      wrap.addEventListener('click', (e) => {
        e.stopPropagation();
        selectFanCard(i, wrap);
      });
      
      // Glow underlay
      const glow = document.createElement('div');
      glow.className = 'fan-glow';
      wrap.appendChild(glow);
      
      // Card (back-only, smaller)
      const cardEl = document.createElement('div');
      cardEl.className = 'card';
      cardEl.style.width = Math.round(cardW * 0.72) + 'px';
      cardEl.style.height = Math.round(cardH * 0.72) + 'px';
      
      const back = document.createElement('div');
      back.className = 'card-back';
      back.innerHTML = createCardBackHTML();
      cardEl.appendChild(back);
      wrap.appendChild(cardEl);
      
      fanContainer.appendChild(wrap);
      
      // Stagger animation
      setTimeout(() => {
        wrap.style.opacity = '1';
        wrap.style.transform = `rotate(${angle}deg) translateY(${arcY}px) scale(1)`;
      }, 80 * i);
    });
  }, 650);
}

// ── Stage: SELECT ──
function selectFanCard(fanIndex, wrapEl) {
  if (stage !== 'draw') return;
  const count = getCardCount();
  
  if (selectedIndices.includes(fanIndex)) {
    // Deselect
    selectedIndices = selectedIndices.filter(i => i !== fanIndex);
    wrapEl.classList.remove('selected');
    currentDrawCount--;
  } else {
    if (selectedIndices.length >= count) {
      // Remove oldest selection
      const oldest = selectedIndices.shift();
      const oldWrap = document.querySelector(`[data-fan-index="${oldest}"]`);
      if (oldWrap) oldWrap.classList.remove('selected');
      currentDrawCount--;
    }
    selectedIndices.push(fanIndex);
    wrapEl.classList.add('selected');
    currentDrawCount++;
  }
  
  const inst = document.getElementById('instruction');
  if (currentDrawCount >= count) {
    inst.innerHTML = '命运之线已牵起<br>轻触任意已选牌面揭开谜底 ✨';
  } else {
    inst.innerHTML = count === 1
      ? `命运已为你展开七张牌<br>凭直觉选择<span class="counter">1</span>张`
      : `已选 <span class="counter">${currentDrawCount}</span> / <span class="counter">${count}</span> 张 · 继续选择`;
  }
}

// ── Stage: REVEAL selected cards ──
function revealSelected() {
  if (stage !== 'draw' || selectedIndices.length === 0) return;
  stage = 'reveal';
  
  drawnCards = selectedIndices.map(i => fanCards[i]);
  const count = drawnCards.length;
  
  // Fade out unselected fan cards
  document.querySelectorAll('.fan-card-wrap').forEach(w => {
    if (!w.classList.contains('selected')) {
      w.style.opacity = '0';
      w.style.pointerEvents = 'none';
    }
  });
  
  document.getElementById('instruction').style.opacity = '0';
  
  const positions = count === 1 ? ['启示'] : ['过往', '当下', '未来'];
  const revealArea = document.getElementById('revealArea');
  revealArea.innerHTML = '';
  revealArea.classList.add('active');
  
  setTimeout(() => {
    drawnCards.forEach((card, i) => {
      const slot = document.createElement('div');
      slot.className = 'card-slot';
      
      const label = document.createElement('div');
      label.className = 'card-label';
      label.textContent = positions[i];
      slot.appendChild(label);
      
      const cardEl = createFullCardElement(card, i);
      cardEl.addEventListener('click', () => flipRevealCard(i, cardEl, slot));
      
      slot.appendChild(cardEl);
      revealArea.appendChild(slot);
      
      // Stagger
      setTimeout(() => {
        slot.classList.add('revealed');
        label.style.opacity = '1';
        label.style.transform = 'translateY(0)';
      }, 300 * i);
    });
  }, 400);
  
  // Clear fan after transition
  setTimeout(() => {
    document.getElementById('deckArea').innerHTML = '';
  }, 800);
}

// ── Click fan card when selection complete → reveal ──
// Override: when selection is complete, clicking any selected card reveals
document.getElementById('deckArea').addEventListener('click', function(e) {
  if (stage !== 'draw') return;
  const wrap = e.target.closest('.fan-card-wrap');
  if (!wrap) return;
  const fanIndex = parseInt(wrap.getAttribute('data-fan-index'));
  if (isNaN(fanIndex)) return;
  
  // If clicking an already selected card AND selection count is complete → reveal
  if (selectedIndices.includes(fanIndex) && selectedIndices.length >= getCardCount()) {
    revealSelected();
  }
  // Otherwise the selectFanCard handler on each wrap handles selection
});

// ── Flip revealed card ──
let revealedCount = 0;
function flipRevealCard(index, cardEl, slot) {
  if (cardEl.classList.contains('flipped')) return;
  cardEl.classList.add('flipped');
  slot.classList.add('revealed');
  revealedCount++;
  
  if (revealedCount >= drawnCards.length) {
    setTimeout(() => showReading(), 1000);
  }
}

// ── Show reading ──
function showReading() {
  const reading = document.getElementById('reading');
  const summary = document.getElementById('cardSummary');
  
  if (drawnCards.length === 1) {
    const card = drawnCards[0];
    const pos = card.isReversed ? '逆位' : '正位';
    summary.innerHTML = `
      <div class="mini-card ${card.isReversed ? 'reversed-mini' : ''}">
        <img class="mini-img ${card.isReversed ? 'reversed-img' : ''}" src="${cardImagePath(card.id)}" alt="${card.name}">
        <div class="mini-name">${card.name}</div>
        <div class="mini-pos">${card.roman} · ${card.en}</div>
        <div class="mini-badge ${card.isReversed ? 'reversed-badge' : 'upright-badge'}">${pos}</div>
      </div>
    `;
    const meaning = card.isReversed ? card.reversed : card.upright;
    document.getElementById('readingText').textContent =
      `命运为你揭开了${card.name}牌（${pos}）。${meaning}`;
  } else {
    summary.innerHTML = drawnCards.map((c, i) => {
      const labels = ['过往', '当下', '未来'];
      const p = c.isReversed ? '逆位' : '正位';
      return `
        <div class="mini-card ${c.isReversed ? 'reversed-mini' : ''}">
          <img class="mini-img ${c.isReversed ? 'reversed-img' : ''}" src="${cardImagePath(c.id)}" alt="${c.name}">
          <div class="mini-name">${c.name}</div>
          <div class="mini-pos">${labels[i]}</div>
          <div class="mini-badge ${c.isReversed ? 'reversed-badge' : 'upright-badge'}">${p}</div>
        </div>
      `;
    }).join('');
    
    const [past, present, future] = drawnCards;
    const pm = past.isReversed ? '逆位' : '正位';
    const prm = present.isReversed ? '逆位' : '正位';
    const fm = future.isReversed ? '逆位' : '正位';
    const pastTxt = past.isReversed ? past.reversed : past.upright;
    const presentTxt = present.isReversed ? present.reversed : present.upright;
    const futureTxt = future.isReversed ? future.reversed : future.upright;
    
    document.getElementById('readingText').textContent =
      `你的${past.name}牌（${pm}）揭示了过往的印记：${pastTxt.slice(0, 35)}。` +
      `而今，${present.name}牌（${prm}）正指引着你当下的道路——${presentTxt.slice(0, 35)}。` +
      `展望未来，${future.name}牌（${fm}）预示：${futureTxt.slice(0, 35)}` +
      `命运的织线已为你铺就，${past.name}、${present.name}与${future.name}——这三张牌共同描绘了你此刻的灵魂图景。`;
  }
  
  reading.style.display = '';
  reading.classList.add('active');
  reading.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── Switch mode ──
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  revealedCount = 0;
  selectedIndices = [];
  drawnCards = [];
  document.getElementById('revealArea').classList.remove('active');
  document.getElementById('revealArea').innerHTML = '';
  document.getElementById('reading').classList.remove('active');
  document.getElementById('reading').style.display = 'none';
  showDeck();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Reshuffle ──
function reshuffle() {
  revealedCount = 0;
  selectedIndices = [];
  drawnCards = [];
  document.getElementById('revealArea').classList.remove('active');
  document.getElementById('revealArea').innerHTML = '';
  document.getElementById('reading').classList.remove('active');
  document.getElementById('reading').style.display = 'none';
  showDeck();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ──
showDeck();
</script>
</body>
