<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>🔮 命运之轮 · 塔罗占卜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

  :root {
    --bg-deep: #080614;
    --bg-card: #110d24;
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --gold-dark: #8b6914;
    --purple: #6b3fa0;
    --purple-deep: #2a1040;
    --text: #d4c5e8;
    --text-dim: #8a7fa0;
    --accent: #c4488a;
    --reversed-bg: #3a1025;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .fog { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 50% 40%, transparent 40%, rgba(8,6,20,0.85) 100%); pointer-events: none; z-index: 1; }

  .main { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem 1rem 4rem; }

  .header { text-align: center; margin-bottom: 0.8rem; }
  .header .moon-phase { font-size: 3.5rem; filter: drop-shadow(0 0 20px rgba(201,169,110,0.4)); animation: float 4s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  .header h1 { font-family: 'Cinzel Decorative', serif; font-size: clamp(1.6rem, 4vw, 2.8rem); font-weight: 900; background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-dark) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 0.08em; margin-top: -0.3rem; }
  .header .subtitle { font-size: 1.05rem; color: var(--text-dim); font-style: italic; letter-spacing: 0.15em; margin-top: 0.3rem; }

  .divider { width: min(280px, 60vw); height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0.8rem 0 1.2rem; position: relative; }
  .divider::after { content: '✦'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-deep); padding: 0 0.8rem; color: var(--gold); font-size: 0.9rem; }

  /* ── Mode Selector ── */
  .mode-selector { display: flex; gap: 0; margin-bottom: 1.5rem; border: 1px solid rgba(201,169,110,0.3); border-radius: 6px; overflow: hidden; }
  .mode-btn { font-family: 'Cinzel Decorative', serif; font-size: 0.72rem; letter-spacing: 0.1em; padding: 0.6rem 1.4rem; background: transparent; color: var(--text-dim); border: none; cursor: pointer; transition: all 0.3s; }
  .mode-btn.active { background: rgba(201,169,110,0.15); color: var(--gold-light); box-shadow: inset 0 0 15px rgba(201,169,110,0.1); }
  .mode-btn:hover:not(.active) { color: var(--gold); background: rgba(201,169,110,0.05); }
  .mode-btn + .mode-btn { border-left: 1px solid rgba(201,169,110,0.2); }

  .instruction { text-align: center; color: var(--text-dim); font-size: 1.1rem; letter-spacing: 0.05em; margin-bottom: 2rem; transition: opacity 0.5s; min-height: 3rem; }

  .spread { display: flex; gap: clamp(1rem, 3vw, 2.5rem); flex-wrap: wrap; justify-content: center; perspective: 2000px; margin-bottom: 2rem; }

  .card-slot { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; }
  .card-label { font-family: 'Cinzel Decorative', serif; font-size: 0.75rem; letter-spacing: 0.15em; color: var(--gold); opacity: 0; transform: translateY(10px); transition: all 0.6s ease; }
  .card-slot.revealed .card-label { opacity: 1; transform: translateY(0); }

  /* ── The Card ── */
  .card { width: clamp(100px, 22vw, 160px); height: clamp(155px, 34vw, 248px); position: relative; cursor: pointer; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 10px; }
  .card.flipped { transform: rotateY(180deg); cursor: default; }
  .card.flipped:hover { transform: rotateY(180deg) scale(1.02); }
  .card:hover:not(.flipped) { transform: translateY(-8px) scale(1.03); filter: brightness(1.15); }
  .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
  .card-front { transform: rotateY(180deg); background: linear-gradient(145deg, #1a0e30 0%, #110a22 40%, #0d0720 100%); border: 1.5px solid var(--gold); box-shadow: 0 0 25px rgba(107,63,160,0.3), inset 0 0 40px rgba(107,63,160,0.08); padding: 1.1rem 0.8rem; text-align: center; justify-content: flex-start; gap: 0.3rem; transition: background 0.8s; }

  /* ── Reversed card front ── */
  .card.reversed .card-front { background: linear-gradient(145deg, #2a1025 0%, #1a0a18 40%, #12061a 100%); border-color: var(--accent); box-shadow: 0 0 30px rgba(196,72,138,0.3), inset 0 0 40px rgba(196,72,138,0.1); }
  .card.reversed .card-front .card-icon { transform: rotate(180deg); filter: drop-shadow(0 0 8px rgba(196,72,138,0.6)); }
  .card.reversed .card-front .card-name { color: var(--accent); }
  .card.reversed .card-front .card-roman { color: #996080; }

  .card-front .card-icon { font-size: 2.2rem; margin-bottom: 0.1rem; filter: drop-shadow(0 0 8px rgba(201,169,110,0.5)); transition: all 0.5s; }
  .card-front .card-name { font-family: 'Cinzel Decorative', serif; font-size: clamp(0.7rem, 1.8vw, 0.95rem); font-weight: 700; color: var(--gold-light); letter-spacing: 0.06em; line-height: 1.3; transition: color 0.5s; }
  .card-front .card-roman { font-size: 0.58rem; color: var(--text-dim); font-style: italic; transition: color 0.5s; }
  .card-front .card-meaning { font-size: clamp(0.55rem, 1.3vw, 0.7rem); color: var(--text); line-height: 1.5; margin-top: 0.2rem; padding: 0 0.3rem; opacity: 0; transform: translateY(8px); transition: all 0.5s ease 0.4s; }
  .card.flipped .card-meaning { opacity: 1; transform: translateY(0); }
  .card-front .card-keywords { font-size: 0.58rem; margin-top: auto; padding: 0.25rem 0.5rem; border-top: 1px solid rgba(201,169,110,0.2); width: 100%; letter-spacing: 0.04em; opacity: 0; transition: opacity 0.5s ease 0.6s; }
  .card.flipped .card-keywords { opacity: 1; }
  .card.reversed .card-front .card-keywords { color: var(--accent); border-top-color: rgba(196,72,138,0.3); }

  /* ── Reversed Badge ── */
  .card-badge { position: absolute; top: 6px; right: 8px; font-family: 'Cinzel Decorative', serif; font-size: 0.55rem; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.1em; z-index: 5; opacity: 0; transform: scale(0.5); transition: all 0.4s ease 0.3s; pointer-events: none; }
  .card.flipped .card-badge { opacity: 1; transform: scale(1); }
  .card-badge.upright { background: rgba(201,169,110,0.2); color: var(--gold); border: 1px solid rgba(201,169,110,0.3); }
  .card-badge.reversed-badge { background: rgba(196,72,138,0.2); color: var(--accent); border: 1px solid rgba(196,72,138,0.3); }

  /* ── Card Back ── */
  .card-back { background: linear-gradient(135deg, #1c0f35 0%, #150a28 50%, #1a0d30 100%); border: 2px solid var(--gold); box-shadow: 0 4px 30px rgba(139,105,20,0.2); }
  .card-back-inner { width: 82%; height: 88%; border: 1px solid rgba(201,169,110,0.4); border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: repeating-linear-gradient(0deg, transparent, transparent 8px, rgba(201,169,110,0.04) 8px, rgba(201,169,110,0.04) 9px); }
  .card-back-eye { font-size: 2.6rem; filter: drop-shadow(0 0 12px rgba(196,72,138,0.5)); margin-bottom: 0.3rem; }
  .card-back-stars { font-size: 0.8rem; letter-spacing: 0.3em; color: var(--gold); opacity: 0.6; }
  .card-back-border { position: absolute; inset: 4px; border: 1px solid rgba(201,169,110,0.15); border-radius: 3px; pointer-events: none; }
  .card-back-corner { position: absolute; font-size: 0.7rem; color: var(--gold); opacity: 0.5; }
  .card-back-corner.tl { top: 6px; left: 8px; } .card-back-corner.tr { top: 6px; right: 8px; }
  .card-back-corner.bl { bottom: 6px; left: 8px; transform: rotate(180deg); } .card-back-corner.br { bottom: 6px; right: 8px; transform: rotate(180deg); }

  /* ── Reading Panel ── */
  .reading { max-width: 680px; width: 100%; text-align: center; opacity: 0; transform: translateY(20px); transition: all 0.8s ease 0.3s; pointer-events: none; }
  .reading.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .reading .reading-title { font-family: 'Cinzel Decorative', serif; font-size: 1.3rem; color: var(--gold-light); letter-spacing: 0.1em; margin-bottom: 1rem; }
  .reading .reading-text { font-size: 1.05rem; line-height: 1.8; color: var(--text); font-style: italic; padding: 1.5rem 2rem; background: rgba(17,13,36,0.7); border: 1px solid rgba(201,169,110,0.2); border-radius: 12px; position: relative; }
  .reading .reading-text::before, .reading .reading-text::after { content: '"'; font-family: 'Cinzel Decorative', serif; font-size: 2.5rem; color: var(--gold); opacity: 0.3; position: absolute; line-height: 1; }
  .reading .reading-text::before { top: -0.3rem; left: 0.8rem; }
  .reading .reading-text::after { bottom: -1.5rem; right: 0.8rem; }

  /* ── Single Card Reading ── */
  .reading .reading-card-summary { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .reading .mini-card { display: inline-flex; flex-direction: column; align-items: center; gap: 0.2rem; padding: 0.8rem 1.2rem; background: rgba(17,13,36,0.8); border: 1px solid rgba(201,169,110,0.25); border-radius: 10px; }
  .reading .mini-card.reversed-mini { border-color: rgba(196,72,138,0.3); background: rgba(42,16,37,0.8); }
  .reading .mini-card .mini-icon { font-size: 1.8rem; }
  .reading .mini-card .mini-name { font-family: 'Cinzel Decorative', serif; font-size: 0.85rem; color: var(--gold-light); }
  .reading .mini-card.reversed-mini .mini-name { color: var(--accent); }
  .reading .mini-card .mini-pos { font-size: 0.65rem; color: var(--text-dim); }
  .reading .mini-card .mini-badge { font-size: 0.55rem; letter-spacing: 0.1em; margin-top: 0.1rem; padding: 1px 6px; border-radius: 3px; }
  .reading .mini-card .mini-badge.upright-badge { color: var(--gold); border: 1px solid rgba(201,169,110,0.3); }
  .reading .mini-card .mini-badge.reversed-badge { color: var(--accent); border: 1px solid rgba(196,72,138,0.3); }

  .btn-row { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; justify-content: center; }
  .btn { font-family: 'Cinzel Decorative', serif; font-size: 0.8rem; letter-spacing: 0.12em; padding: 0.8rem 2rem; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; border-radius: 4px; transition: all 0.3s; text-transform: uppercase; }
  .btn:hover { background: rgba(201,169,110,0.1); box-shadow: 0 0 20px rgba(201,169,110,0.2); }
  .btn.primary { background: rgba(201,169,110,0.12); border-color: var(--gold-light); color: var(--gold-light); }
  .btn.primary:hover { background: rgba(201,169,110,0.25); box-shadow: 0 0 30px rgba(201,169,110,0.3); }

  .flip-progress { display: flex; gap: 0.4rem; margin-bottom: 1.5rem; }
  .flip-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(201,169,110,0.2); border: 1px solid rgba(201,169,110,0.3); transition: all 0.4s; }
  .flip-dot.done { background: var(--gold); box-shadow: 0 0 10px var(--gold); }

  @media (max-width: 640px) {
    .spread { gap: 0.8rem; } .card { width: 95px; height: 148px; }
    .card-front { padding: 0.5rem 0.3rem; gap: 0.1rem; }
    .card-front .card-icon { font-size: 1.5rem; } .card-front .card-name { font-size: 0.6rem; }
    .card-front .card-meaning { font-size: 0.5rem; margin-top: 0.05rem; }
    .card-back-eye { font-size: 1.8rem; } .card-back-stars { font-size: 0.6rem; }
    .reading .reading-text { padding: 1rem 1.2rem; font-size: 0.9rem; }
    .mode-btn { padding: 0.5rem 1rem; font-size: 0.65rem; }
    .card-badge { font-size: 0.48rem; top: 4px; right: 4px; }
  }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="fog"></div>

<div class="main">
  <div class="header">
    <div class="moon-phase">🔮</div>
    <h1>命运之轮</h1>
    <p class="subtitle">The Wheel of Fortune</p>
  </div>
  <div class="divider"></div>

  <!-- Mode Selector -->
  <div class="mode-selector" id="modeSelector">
    <button class="mode-btn" data-mode="single" onclick="switchMode('single')">☽ 单张占卜</button>
    <button class="mode-btn active" data-mode="three" onclick="switchMode('three')">☀ 三牌阵</button>
  </div>

  <p class="instruction" id="instruction">静心凝神，在心中默念你的问题<br>然后翻开牌面</p>

  <div class="flip-progress" id="progress">
    <div class="flip-dot" data-idx="0"></div>
    <div class="flip-dot" data-idx="1"></div>
    <div class="flip-dot" data-idx="2"></div>
  </div>

  <div class="spread" id="spread"></div>

  <div class="reading" id="reading">
    <div class="reading-title">✦ 命运的低语 ✦</div>
    <div class="reading-card-summary" id="cardSummary"></div>
    <div class="reading-text" id="readingText"></div>
    <div class="btn-row">
      <button class="btn primary" onclick="reshuffle()">🔮 重新占卜</button>
    </div>
  </div>
</div>

// ═══════════════════════════════════════
let currentMode = 'three';
let drawnCards = [];
let flipCount = 0;

function getCardCount() { return currentMode === 'single' ? 1 : 3; }

// ═══════════════════════════════════════
//  STARFIELD
// ═══════════════════════════════════════
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [], shootingStars = [];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createStars() {
  stars = [];
  const count = Math.floor((canvas.width * canvas.height) / 1800);
  for (let i = 0; i < count; i++) {
    stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.5 + 0.3, twinkle: Math.random() * Math.PI * 2, speed: 0.01 + Math.random() * 0.03, alpha: 0.3 + Math.random() * 0.7 });
  }
}
createStars();
window.addEventListener('resize', createStars);

function spawnShootingStar() {
  if (Math.random() < 0.003) {
    shootingStars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height * 0.5, len: 40 + Math.random() * 80, speed: 8 + Math.random() * 12, angle: Math.PI/4 + Math.random()*0.3, life: 0, maxLife: 40 + Math.random() * 30 });
  }
}

function drawStarfield() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.twinkle += s.speed;
    const a = s.alpha * (0.5 + 0.5*Math.sin(s.twinkle));
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fillStyle = `rgba(220,210,255,${a})`; ctx.fill();
    if (s.r > 1.1) { ctx.beginPath(); ctx.arc(s.x, s.y, s.r*2.5, 0, Math.PI*2); ctx.fillStyle = `rgba(180,150,255,${a*0.1})`; ctx.fill(); }
  });
  spawnShootingStar();
  shootingStars = shootingStars.filter(s => {
    s.life++; if (s.life > s.maxLife) return false;
    const p = s.life/s.maxLife, a = p<0.2 ? p/0.2 : 1-(p-0.2)/0.8;
    const ex = s.x - Math.cos(s.angle)*s.len, ey = s.y + Math.sin(s.angle)*s.len;
    const g = ctx.createLinearGradient(s.x, s.y, ex, ey);
    g.addColorStop(0, `rgba(255,255,255,${a})`); g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(ex, ey); ctx.strokeStyle = g; ctx.lineWidth = 1.5; ctx.stroke();
    s.x -= Math.cos(s.angle)*s.speed; s.y += Math.sin(s.angle)*s.speed;
    return true;
  });
  requestAnimationFrame(drawStarfield);
}
drawStarfield();

// ═══════════════════════════════════════
function shuffle(a) { const arr = [...a]; for (let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('instruction').style.opacity = '1';
  document.getElementById('instruction').innerHTML = mode === 'single'
    ? '静心凝神，在心中默念你的问题<br>然后翻开牌面，接受命运的启示'
    : '静心凝神，在心中默念你的问题<br>然后依次翻开三张牌';
  initSpread();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function initSpread() {
  const count = getCardCount();
  drawnCards = shuffle(MAJOR_ARCANA).slice(0, count).map(card => ({
    ...card,
    isReversed: Math.random() < 0.5
  }));
  flipCount = 0;
  
  const spread = document.getElementById('spread');
  const progress = document.getElementById('progress');
  const reading = document.getElementById('reading');
  
  spread.innerHTML = '';
  reading.classList.remove('active');
  
  // Progress dots
  const dots = progress.querySelectorAll('.flip-dot');
  dots.forEach(d => d.classList.remove('done'));
  dots.forEach((d, i) => { d.style.display = i < count ? '' : 'none'; });
  
  const positions = count === 1 ? ['启示'] : ['过往', '当下', '未来'];
  
  drawnCards.forEach((card, i) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    
    const label = document.createElement('div');
    label.className = 'card-label';
    label.textContent = positions[i];
    slot.appendChild(label);
    
    const cardEl = document.createElement('div');
    cardEl.className = 'card' + (card.isReversed ? ' reversed' : '');
    cardEl.setAttribute('data-index', i);
    
    // Badge
    const badge = document.createElement('div');
    badge.className = 'card-badge ' + (card.isReversed ? 'reversed-badge' : 'upright');
    badge.textContent = card.isReversed ? '逆位' : '正位';
    
    // Front
    const front = document.createElement('div');
    front.className = 'card-front';
    const meaning = card.isReversed ? card.reversed : card.upright;
    const kw = card.isReversed ? (card.keywordsR || card.keywords) : card.keywords;
    front.innerHTML = `
      <div class="card-icon">${card.icon}</div>
      <div class="card-name">${card.name}</div>
      <div class="card-roman">${card.roman} · ${card.en}</div>
      <div class="card-meaning">${meaning}</div>
      <div class="card-keywords">${kw}</div>
    `;
    
    // Back
    const back = document.createElement('div');
    back.className = 'card-back';
    back.innerHTML = `
      <div class="card-back-inner">
        <div class="card-back-border"></div>
        <div class="card-back-corner tl">✧</div><div class="card-back-corner tr">✧</div>
        <div class="card-back-corner bl">✧</div><div class="card-back-corner br">✧</div>
        <div class="card-back-eye">🧿</div>
        <div class="card-back-stars">✧ ✦ ✧</div>
      </div>
    `;
    
    cardEl.appendChild(front);
    cardEl.appendChild(back);
    cardEl.appendChild(badge);
    
    cardEl.addEventListener('click', () => flipCard(i, cardEl, slot));
    
    slot.appendChild(cardEl);
    spread.appendChild(slot);
  });
}

function flipCard(index, cardEl, slot) {
  if (cardEl.classList.contains('flipped')) return;
  
  cardEl.classList.add('flipped');
  slot.classList.add('revealed');
  flipCount++;
  
  document.querySelectorAll('.flip-dot')[index].classList.add('done');
  
  const total = getCardCount();
  if (flipCount === total) {
    setTimeout(() => showReading(), 1000);
  }
}

function showReading() {
  const reading = document.getElementById('reading');
  document.getElementById('instruction').style.opacity = '0';
  const summary = document.getElementById('cardSummary');
  
  if (currentMode === 'single') {
    const card = drawnCards[0];
    const pos = card.isReversed ? '逆位' : '正位';
    summary.innerHTML = `
      <div class="mini-card ${card.isReversed ? 'reversed-mini' : ''}">
        <div class="mini-icon">${card.icon}</div>
        <div class="mini-name">${card.name}</div>
        <div class="mini-pos">${card.roman} · ${card.en}</div>
        <div class="mini-badge ${card.isReversed ? 'reversed-badge' : 'upright-badge'}">${pos}</div>
      </div>
    `;
    
    const meaning = card.isReversed ? card.reversed : card.upright;
    document.getElementById('readingText').textContent =
      `命运为你揭开了${card.name}牌（${pos}）。${meaning}`;
    
  } else {
    const [past, present, future] = drawnCards;
    summary.innerHTML = drawnCards.map((c, i) => {
      const labels = ['过往', '当下', '未来'];
      const p = c.isReversed ? '逆位' : '正位';
      return `
        <div class="mini-card ${c.isReversed ? 'reversed-mini' : ''}">
          <div class="mini-icon">${c.icon}</div>
          <div class="mini-name">${c.name}</div>
          <div class="mini-pos">${labels[i]}</div>
          <div class="mini-badge ${c.isReversed ? 'reversed-badge' : 'upright-badge'}">${p}</div>
        </div>
      `;
    }).join('');
    
    const pm = past.isReversed ? '逆位' : '正位';
    const prm = present.isReversed ? '逆位' : '正位';
    const fm = future.isReversed ? '逆位' : '正位';
    const pastTxt = past.isReversed ? past.reversed : past.upright;
    const presentTxt = present.isReversed ? present.reversed : present.upright;
    const futureTxt = future.isReversed ? future.reversed : future.upright;
    
    document.getElementById('readingText').textContent =
      `你的${past.name}牌（${pm}）揭示了过往的印记：${pastTxt.slice(0, 35)}。` +
      `而今，${present.name}牌（${prm}）正指引着你当下的道路——${presentTxt.slice(0, 35)}。` +
      `展望未来，${future.name}牌（${fm}）预示：${futureTxt.slice(0, 35)}` +
      `命运的织线已为你铺就，${past.name}、${present.name}与${future.name}——这三张牌共同描绘了你此刻的灵魂图景。`;
  }
  
  reading.classList.add('active');
  reading.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function reshuffle() {
  document.getElementById('reading').classList.remove('active');
  document.getElementById('instruction').style.opacity = '1';
  initSpread();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ──
initSpread();
</script>
